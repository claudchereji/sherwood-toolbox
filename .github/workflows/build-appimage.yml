name: Build AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (optional)'
        required: false

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Use the *system* python3 on the runner (Ubuntu 22.04) so that apt-installed
      # PyGObject + WebKitGTK gi bindings are visible (--system-site-packages venv).
      # Never use actions/setup-python for this job.

      - name: Install system dependencies (PyGObject + WebKitGTK 4.0 for Ubuntu 22.04)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-gi \
            python3-gi-cairo \
            gir1.2-webkit2-4.0 \
            libwebkit2gtk-4.0-37 \
            libgirepository1.0-dev \
            libcairo2-dev \
            pkg-config \
            fuse \
            rsync \
            wget \
            file \
            desktop-file-utils

      - name: Install Python build dependencies (system python3)
        run: |
          python3 -m pip install --upgrade pip --quiet
          python3 -m pip install . --quiet

      - name: Build AppImage
        run: |
          chmod +x run/build-appimage.sh
          ./run/build-appimage.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sherwood-Toolbox-AppImage
          path: Sherwood_Toolbox-*.AppImage
          retention-days: 7

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Sherwood_Toolbox-*.AppImage
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
