name: Build AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (optional)'
        required: false

jobs:
  build-appimage:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies (for PyGObject + WebKitGTK)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-gi \
            python3-gi-cairo \
            gir1.2-webkit2-4.1 \
            libwebkit2gtk-4.1-0 \
            libgirepository1.0-dev \
            libcairo2-dev \
            pkg-config \
            fuse \
            rsync \
            wget \
            file \
            desktop-file-utils

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          # We install the project so pyproject.toml dependencies are satisfied
          pip install .

      - name: Build AppImage
        run: |
          chmod +x run/build-appimage.sh
          ./run/build-appimage.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sherwood-Toolbox-AppImage
          path: Sherwood_Toolbox-*.AppImage
          retention-days: 7

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Sherwood_Toolbox-*.AppImage
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
